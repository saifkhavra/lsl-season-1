<title>LSL Auction Control System V3</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',sans-serif;
color:white;
overflow-x:hidden;
min-height:100vh;
position:relative;
background:#050816;
}

body::before{
content:"";
position:fixed;
inset:0;
background:url("images/background.jpg") center center/cover no-repeat;
opacity:0.18;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.75));
z-index:-1;
}

header{
padding:20px;
text-align:center;
}

.header-content{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
padding:20px;
border-radius:24px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
overflow:hidden;
}

.header-content::before{
content:"";
position:absolute;
inset:-2px;
border-radius:24px;
background:
linear-gradient(
130deg,
gold,
#00e5ff,
#ff00cc,
gold
);
background-size:300% 300%;
animation:borderMove 8s linear infinite;
filter:blur(16px);
z-index:-1;
}

@keyframes borderMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.logo{
height:130px;
width:auto;
animation:logoGlow 3s ease-in-out infinite alternate;
}

@keyframes logoGlow{
0%{
filter:
drop-shadow(0 0 10px gold)
drop-shadow(0 0 25px rgba(255,215,0,0.5));
}
100%{
filter:
drop-shadow(0 0 25px gold)
drop-shadow(0 0 50px rgba(255,215,0,0.8));
}
}

.title{
flex:1;
font-size:42px;
font-weight:900;
text-transform:uppercase;
letter-spacing:2px;
animation:titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow{
0%{
text-shadow:
0 0 8px white,
0 0 18px #00e5ff,
0 0 35px #ff00cc;
}
100%{
text-shadow:
0 0 15px white,
0 0 35px #00e5ff,
0 0 60px #ff00cc;
}
}

.organised{
margin-top:12px;
font-size:18px;
font-weight:900;
background:linear-gradient(90deg,gold,white,gold);
background-size:200% auto;
-webkit-background-clip:text;
color:transparent;
animation:shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:-200% center;}
100%{background-position:200% center;}
}


/* =========================
   PREMIUM ORGANISED TEXT
========================= */

.organised-wrapper{

display:flex;

align-items:center;

justify-content:center;

gap:18px;

margin-top:18px;

padding:0 20px;

}

.organised-line{

width:120px;

height:2px;

border-radius:20px;

background:
linear-gradient(
90deg,
transparent,
gold,
white,
gold,
transparent
);

background-size:200% auto;

animation:lineGlow 4s linear infinite;

box-shadow:
0 0 12px gold,
0 0 30px rgba(255,215,0,0.4);

}

@keyframes lineGlow{

0%{
background-position:-200% center;
}

100%{
background-position:200% center;
}
}

.organised{

display:flex;

flex-direction:column;

align-items:center;

line-height:1.1;

animation:organisedFloat 4s ease-in-out infinite;

}

@keyframes organisedFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-3px);
}

100%{
transform:translateY(0px);
}
}

.org-small{

font-size:16px;

font-weight:700;

letter-spacing:4px;

text-transform:uppercase;

color:#ffffff;

opacity:0.8;

margin-bottom:4px;

text-shadow:
0 0 10px rgba(255,255,255,0.5);

}

.org-main{

font-size:30px;

font-weight:900;

letter-spacing:2px;

text-transform:uppercase;

background:
linear-gradient(
90deg,
#FFD700,
#ffffff,
#00E5FF,
#FFD700
);

background-size:300% auto;

-webkit-background-clip:text;

color:transparent;

animation:orgShine 5s linear infinite;

text-shadow:
0 0 10px rgba(255,215,0,0.5),
0 0 30px rgba(0,191,255,0.25);

}

@keyframes orgShine{

0%{
background-position:-200% center;
}

100%{
background-position:200% center;
}

}

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,0,0,0.3);}
50%{box-shadow:0 0 25px rgba(255,0,0,0.6);}
100%{box-shadow:0 0 10px rgba(255,0,0,0.3);}
}

.top-nav{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;

}

.top-nav button{

border-radius:14px;

font-weight:900;
cursor:pointer;

}

.top-nav button:hover{
transform:scale(1.06);
}

.controls{
display:flex;
justify-content:center;

}

input,select{

}

}

.card{

overflow:hidden;
border-radius:24px;
background:rgba(255,255,255,0.06);

box-shadow:0 0 25px rgba(0,0,0,0.4);
animation:floatCard 5s ease-in-out infinite;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

@keyframes floatCard{
0%{transform:translateY(0px);}
50%{transform:translateY(-6px);}
100%{transform:translateY(0px);}
}

.card::before{
content:"";
position:absolute;
inset:0;
padding:2px;
border-radius:24px;
background:
linear-gradient(
130deg,
gold,
#ff00cc,
#00e5ff,
gold
);
background-size:300% 300%;
animation:borderMove 6s linear infinite;

linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

pointer-events:none;
}

.card img{
width:100%;
height:280px;
object-fit:contain;

.card-content{
padding:16px;

}

.card h3{

padding:8px 14px;
border-radius:12px;

color:black;

}

.badge{

margin:5px;
padding:7px 12px;
border-radius:12px;
font-size:12px;
font-weight:900;

color:black;
}

.sold-badge{

color:white !important;

}

.price-badge{

color:black !important;

grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

.team-box{
position:relative;
overflow:hidden;
padding:20px;
border-radius:22px;
background:rgba(255,255,255,0.06);

}

height:110px;

}

@keyframes teamGlow{
0%{
filter:
drop-shadow(0 0 10px gold)
drop-shadow(0 0 25px rgba(255,215,0,0.5));
}
100%{
filter:
drop-shadow(0 0 20px gold)
drop-shadow(0 0 45px rgba(255,215,0,0.9));
}
}

/* =========================

0 0 25px rgba(0,0,0,0.45);

.team-tab::before{

content:"";

position:absolute;

inset:-2px;

background:
linear-gradient(
130deg,
gold,
#00E5FF,
#FF00CC,
gold
);

background-size:300% 300%;

animation:borderFlow 5s linear infinite;

filter:blur(12px);

z-index:-1;

.team-tab:hover{

translateY(-8px)

box-shadow:
0 0 35px rgba(255,215,0,0.65);

.team-tab img{

position:absolute;

inset:0;

width:100%;

height:100%;

transition:0.4s ease;

filter:
drop-shadow(0 0 18px rgba(255,215,0,0.65));

}

.team-tab::after{

content:"";

position:absolute;

inset:0;

background:
linear-gradient(
to top,
rgba(0,0,0,0.85),
rgba(0,0,0,0.15),
transparent
);

z-index:1;

}

@keyframes teamPulse{

0%{
transform:scale(1);
}

100%{
transform:scale(1.08);
}
}

.team-tab h3{

position:relative;

z-index:2;

font-size:18px;

font-weight:900;

letter-spacing:1px;

text-transform:uppercase;

color:white;

padding:10px 18px;

border-radius:14px;

background:
rgba(0,0,0,0.45);

backdrop-filter:blur(10px);

text-shadow:
0 0 12px rgba(255,255,255,0.4);

}

/* =========================
   TEAM DISPLAY
========================= */

.team-display{

position:relative;

padding:30px;

border-radius:28px;

background:
linear-gradient(
145deg,
rgba(255,255,255,0.08),
rgba(255,255,255,0.03)
);

overflow:hidden;

min-height:650px;

}

content:"";

position:absolute;

inset:-2px;

background:
linear-gradient(
130deg,
gold,
#00E5FF,
#FF00CC,
gold

animation:borderFlow 6s linear infinite;

filter:blur(15px);

z-index:-1;

.team-squad-image{

position:absolute;

inset:0;

width:100%;

height:100%;

object-fit:contain;

object-position:center center;

opacity:0.18;

blur(1px)
brightness(0.7)
contrast(1.1);

@keyframes stadiumGlow{

100%{

.team-overlay{

radial-gradient(
circle at top,
rgba(255,255,255,0.08),
transparent 35%
),

radial-gradient(
circle at bottom,
rgba(0,191,255,0.08),
transparent 35%
);

}

.team-players-list{

margin-top:30px;

display:grid;

grid-template-columns:
repeat(auto-fill,minmax(220px,1fr));

gap:16px;

}

.team-player-card{

padding:16px;

border-radius:18px;

background:
rgba(255,255,255,0.06);

backdrop-filter:blur(12px);

border:1px solid rgba(255,255,255,0.08);

transition:0.3s ease;

}

.team-player-card:hover{

transform:translateY(-5px);

box-shadow:
0 0 20px rgba(255,215,0,0.25),
0 0 40px rgba(0,191,255,0.15);

}

.team-player-card h4{

margin-bottom:10px;

font-size:16px;

color:gold;

}

.team-box h2{
text-align:center;
color:gold;
margin-bottom:15px;
}

.team-stat{
margin-top:10px;
padding:12px;
border-radius:12px;
background:rgba(255,255,255,0.06);
}

#idleOverlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:black;
z-index:999999;
}

#idleVideo{
width:100%;
height:100%;
object-fit:contain;
}

@media(max-width:768px){

.header-content{
flex-direction:column;
}

.title{
font-size:24px;
text-align:center;
}

.logo{
height:90px;
}

.grid{
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
}

}

});

}

fetch("players.csv")

.then(response => response.text())

.then(data => {

const rows =
data.trim().split("\n").slice(1);

players = rows.map(row => {

const cols =
row.split(",").map(col =>
col.replace(/^"|"$/g,"").trim()
);

return {

name: cols[0],
age: cols[1],
location: cols[2],
role: cols[3],
batting: cols[4],
bowling: cols[5],
category: cols[6],
img: cols[7],

sold:false,
soldTo:"",
soldPrice:0

};

});

loadSoldPlayers();

});

function loadSoldPlayers(){

/* RESET TEAMS */
teams.forEach(team => {

team.players = [];

team.used = 0;

team.purse = 100000;

});

/* RESET PLAYER SOLD STATUS */
players.forEach(player => {

player.sold = false;

player.soldTo = "";

player.soldPrice = 0;

});

fetch("sold_players.csv")

.then(response => response.text())

.then(data => {

/* FIX WINDOWS CSV */
data = data.replace(/\r/g, "");

const rows = data.trim().split("\n").slice(1);

rows.forEach(row => {

const cols = row.split(",").map(c =>
c.replace(/^"|"$/g, "").trim()
);

/* CSV STRUCTURE */

const playerName = cols[0]?.trim();

const auctionStatus = cols[6]?.trim().toLowerCase();

const soldPrice = parseInt(cols[7]) || 0;

const teamName = cols[8]?.trim();

/* ONLY SOLD PLAYERS */

if(auctionStatus !== "sold"){
return;
}

/* FIND PLAYER */

const player = players.find(
p =>
p.name.trim().toLowerCase()
===
playerName.trim().toLowerCase()
);

/* FIND TEAM */

const team = teams.find(
t =>
t.name.trim().toLowerCase()
===
teamName.trim().toLowerCase()
);

/* DEBUG */

console.log(
"PLAYER:",
playerName,
"| TEAM:",
teamName,
"| FOUND:",
!!player,
!!team
);

/* UPDATE */

if(player && team){

player.sold = true;

player.soldTo = team.name;

player.soldPrice = soldPrice;

/* PREVENT DUPLICATES */

const alreadyExists =
team.players.some(
tp => tp.name === player.name
);

if(!alreadyExists){

team.players.push(player);

team.used += soldPrice;

team.purse -= soldPrice;

}

}

});

/* REFRESH UI */

renderPlayers(players);

loadDashboard();

loadTeamsPage();

initializeTeamTabs();

})

.catch(error => {

console.error(
"Error loading sold_players.csv:",
error
);

});

}

/* CLEAR */

display.innerHTML = "";

function filterPlayers(){

const search =
document.getElementById("searchInput")
.value
.toLowerCase();

const role =
document.getElementById("roleFilter")
.value;

const location =
document.getElementById("locationFilter")
.value;

const filtered =
players.filter(player => {

return (

player.name.toLowerCase().includes(search)

&&

(
role === ""
||
player.role === role
)

&&

(
location === ""
||
player.location === location
)

);

});

renderPlayers(filtered);

}

document
.getElementById("searchInput")
.addEventListener("input",filterPlayers);

document
.getElementById("roleFilter")
.addEventListener("change",filterPlayers);

document
.getElementById("locationFilter")
.addEventListener("change",filterPlayers);

/* IDLE VIDEO */

let idleTimer;

const idleOverlay =
document.getElementById("idleOverlay");

const idleVideo =
document.getElementById("idleVideo");

const idleVideos = [

"videos/team1.mp4",
"videos/team2.mp4"

];

let currentVideo = 0;

function startIdleMode(){

idleOverlay.style.display = "flex";

playNextVideo();

}

function stopIdleMode(){

idleOverlay.style.display = "none";

idleVideo.pause();

idleVideo.currentTime = 0;

}

function playNextVideo(){

idleVideo.src =
idleVideos[currentVideo];

idleVideo.play();

currentVideo =
(currentVideo + 1)
%
idleVideos.length;

idleVideo.onended = () => {

setTimeout(() => {

playNextVideo();

},3000);

};

}

function resetIdleTimer(){

clearTimeout(idleTimer);

stopIdleMode();

idleTimer =
setTimeout(startIdleMode,30000);

}

[
"mousemove",
"mousedown",
"keypress",
"touchstart",
"scroll"
].forEach(event => {

document.addEventListener(
event,
resetIdleTimer
);

});

resetIdleTimer();

</script>
